<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MartinTech | Elite Digital Service</title>
    <style>
        :root {
            --neon: #ccff00;
            --glass: rgba(255, 255, 255, 0.05);
            --bg-gradient: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            --whatsapp: #25d366;
        }

        body {
            background: var(--bg-gradient);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        nav {
            width: 260px;
            background: rgba(0, 0, 0, 0.9);
            border-right: 1px solid var(--neon);
            display: flex;
            flex-direction: column;
            padding: 30px;
            z-index: 10;
        }

        .logo-nav {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon);
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 50px;
            text-shadow: 0 0 10px var(--neon);
        }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: #888;
            padding: 15px;
            margin-bottom: 10px;
            text-align: left;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .nav-btn:hover, .nav-btn.active {
            color: var(--neon);
            border-color: var(--neon);
            background: rgba(204, 255, 0, 0.05);
        }

        /* --- CONTENIDO --- */
        main {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .subpagina {
            display: none;
        }

        .subpagina.active {
            display: block;
        }

        /* --- ANIMACIÓN DE INICIO (CAÍDA) --- */
        .inicio-central {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }

        .logo-caida-central h1 {
            font-size: 6rem;
            font-weight: 900;
            color: var(--neon);
            text-shadow: 0 0 30px var(--neon);
            margin: 0;
            animation: caerCentro 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes caerCentro {
            0% { transform: translateY(-400px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* --- CARDS Y BOTONES --- */
        .grid-servicios {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .item-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .btn-consultar {
            display: block;
            background: var(--neon);
            color: black;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 15px;
            animation: pulso 2s infinite;
            transition: 0.3s;
        }

        @keyframes pulso {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(204, 255, 0, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 5px rgba(204, 255, 0, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(204, 255, 0, 0); }
        }

        /* --- WHATSAPP --- */
        .btn-whatsapp {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--whatsapp);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    </a>

    <nav>

        </div>
    </main>

    <script>
        function ver(id) {
            document.querySelectorAll('.subpagina').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
